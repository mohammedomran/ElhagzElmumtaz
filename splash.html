<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الحجز الممتاز</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="splash">

    <div class="splash__logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
        <path d="M12 2.5 20 7v10l-8 4.5L4 17V7l8-4.5z"/>
        <circle cx="12" cy="12" r="3.4"/>
        <path d="M12 8.6v6.8M8.6 12h6.8"/>
      </svg>
    </div>

    <h1 class="splash__title">الحجز الممتاز</h1>
    <p class="splash__subtitle">أمتع تجربة كورة في مصر</p>

    <div class="splash__dots" aria-label="جاري التحميل">
      <span></span><span></span><span></span>
    </div>

    <footer class="splash__foot">
      <div class="splash__bar"></div>
      <div class="splash__tag">PREMIUM FOOTBALL EXPERIENCE</div>
    </footer>
  </main>

  <script>
    // Auto-advance to sign-in after the splash plays
    setTimeout(function () { window.location.href = "signin.html"; }, 2600);
  </script>
</body>
</html>
