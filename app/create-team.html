<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء فريق — الحجز الممتاز</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-page">

    <header class="app-bar">
      <h1 class="app-bar__title">إنشاء فريق</h1>
      <a href="league-details.html" class="app-bar__back">
        رجوع
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
      </a>
    </header>

    <main class="app-content">

      <!-- League context -->
      <section class="glass-card" style="margin-bottom:var(--s-lg)">
        <span class="pill pill--primary pill--dot" style="margin-bottom:var(--s-md)">دوري الجمعة — الموسم الأول</span>
        <div class="match-row" style="margin-bottom:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <span>أنت هتكون كابتن الفريق</span>
        </div>
      </section>

      <!-- Team name input -->
      <div class="field">
        <label class="field-label" for="team-name">اسم الفريق</label>
        <div class="input-shell">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <input id="team-name" type="text" placeholder="مثلاً: الصقور، النمور..." />
        </div>
      </div>

      <!-- Price info -->
      <section class="glass-card" style="margin-bottom:var(--s-lg)">
        <div class="summary-row">
          <span class="summary-row__key">رسوم الاشتراك في الدوري:</span>
          <span class="summary-row__val">500 ج</span>
        </div>
        <div class="summary-row summary-row--total">
          <span class="summary-row__key">الإجمالي:</span>
          <span class="summary-row__val">500 ج</span>
        </div>
      </section>

      <!-- Info note -->
      <div class="info-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        <div>
          <p class="info-note__title">ملحوظة</p>
          <p class="info-note__text">بعد الدفع هتقدر تضيف لاعبين لفريقك وتقبل طلبات الانضمام من لاعبين تانيين.</p>
        </div>
      </div>

    </main>

    <!-- Sticky CTA -->
    <div class="sticky-cta">
      <a href="payment.html" class="btn-pitch" style="display:block;text-align:center;line-height:52px;text-decoration:none">ادفع وأنشئ الفريق · 500 ج</a>
    </div>

  </div>
</body>
</html>
