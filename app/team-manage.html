<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الفريق — الحجز الممتاز</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-page">

    <header class="app-bar">
      <h1 class="app-bar__title">إدارة الفريق</h1>
      <a href="leagues.html" class="app-bar__back">
        رجوع
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
      </a>
    </header>

    <main class="app-content">

      <!-- Team header -->
      <section class="glass-card" style="margin-bottom:var(--s-md);text-align:center">
        <div class="team-card__icon" style="width:64px;height:64px;border-radius:50%;margin:0 auto var(--s-md)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h2 class="card-title" style="margin-bottom:var(--s-sm);text-align:center">الصقور</h2>
        <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
          <span class="badge-captain">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 1 3.09 6.26L22 8.27l-5 4.87L18.18 20 12 16.77 5.82 20 7 13.14l-5-4.87 6.91-1.01L12 1z"/></svg>
            أنت الكابتن
          </span>
          <span class="pill pill--primary">دوري الجمعة</span>
        </div>
      </section>

      <!-- Current players -->
      <section class="glass-card" style="margin-bottom:var(--s-md)">
        <div class="section-head" style="margin:0 0 var(--s-md)">
          <h3 class="section-title" style="font-size:17px">لاعبين الفريق</h3>
          <span class="pill pill--neutral">3 / 7</span>
        </div>

        <div class="player-list">
          <div class="player-list-item">
            <span class="ring ring-gold"><span class="avatar" style="width:36px;height:36px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <span class="player-list-item__name">أحمد علي</span>
            <span class="badge-captain">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 1 3.09 6.26L22 8.27l-5 4.87L18.18 20 12 16.77 5.82 20 7 13.14l-5-4.87 6.91-1.01L12 1z"/></svg>
              كابتن
            </span>
          </div>
          <div class="player-list-item">
            <span class="ring ring-primary"><span class="avatar" style="width:36px;height:36px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <span class="player-list-item__name">ياسين رامي</span>
            <span class="player-list-item__role">لاعب</span>
          </div>
          <div class="player-list-item">
            <span class="ring ring-silver"><span class="avatar" style="width:36px;height:36px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <span class="player-list-item__name">كريم محمود</span>
            <span class="player-list-item__role">لاعب</span>
          </div>
        </div>

        <!-- Add player -->
        <div class="divider-text">إضافة لاعب جديد</div>
        <div class="add-player-row">
          <div class="input-shell">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
            </span>
            <input type="text" placeholder="اسم اللاعب أو رقم الموبايل" />
          </div>
          <button class="btn-add" aria-label="إضافة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </section>

      <!-- Join requests -->
      <section class="glass-card" style="margin-bottom:var(--s-md)">
        <div class="section-head" style="margin:0 0 var(--s-md)">
          <h3 class="section-title" style="font-size:17px">طلبات الانضمام</h3>
          <span class="pill pill--accent pill--dot">3 طلبات</span>
        </div>

        <div class="request-card">
          <span class="ring ring-primary"><span class="avatar" style="width:40px;height:40px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
          <div class="request-card__info">
            <div class="request-card__name">سامح عبدالله</div>
            <div class="request-card__date">منذ ساعتين</div>
          </div>
          <div class="request-card__actions">
            <button class="btn-accept" aria-label="قبول">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button class="btn-reject" aria-label="رفض">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>

        <div class="request-card">
          <span class="ring ring-bronze"><span class="avatar" style="width:40px;height:40px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
          <div class="request-card__info">
            <div class="request-card__name">خالد سمير</div>
            <div class="request-card__date">منذ 5 ساعات</div>
          </div>
          <div class="request-card__actions">
            <button class="btn-accept" aria-label="قبول">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button class="btn-reject" aria-label="رفض">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>

        <div class="request-card">
          <span class="ring ring-silver"><span class="avatar" style="width:40px;height:40px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
          <div class="request-card__info">
            <div class="request-card__name">عادل مصطفى</div>
            <div class="request-card__date">منذ يوم</div>
          </div>
          <div class="request-card__actions">
            <button class="btn-accept" aria-label="قبول">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button class="btn-reject" aria-label="رفض">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
      </section>

    </main>

  </div>
</body>
</html>
