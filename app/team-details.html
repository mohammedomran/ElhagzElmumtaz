<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل الفريق — الحجز الممتاز</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-page">

    <header class="app-bar">
      <h1 class="app-bar__title">تفاصيل الفريق</h1>
      <a href="league-details.html" class="app-bar__back">
        رجوع
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
      </a>
    </header>

    <main class="app-content">

      <!-- Team header -->
      <section class="glass-card" style="margin-bottom:var(--s-md);text-align:center">
        <div class="team-card__icon" style="width:64px;height:64px;border-radius:50%;margin:0 auto var(--s-md)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h2 class="card-title" style="margin-bottom:var(--s-sm);text-align:center">الصقور</h2>
        <span class="badge-captain">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 1 3.09 6.26L22 8.27l-5 4.87L18.18 20 12 16.77 5.82 20 7 13.14l-5-4.87 6.91-1.01L12 1z"/></svg>
          الكابتن: أحمد علي
        </span>
      </section>

      <!-- Team info -->
      <section class="glass-card" style="margin-bottom:var(--s-md)">
        <div class="match-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg>
          <span>دوري الجمعة — الموسم الأول</span>
        </div>
        <div class="match-row" style="margin-bottom:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <span>5 لاعبين في الفريق</span>
        </div>
      </section>

      <!-- Players -->
      <section class="glass-card" style="margin-bottom:var(--s-md)">
        <div class="section-head" style="margin:0 0 var(--s-md)">
          <h3 class="section-title" style="font-size:17px">اللعيبة</h3>
          <span class="pill pill--neutral">5 / 7</span>
        </div>
        <div class="player-grid">
          <div class="player-chip">
            <span class="ring ring-gold"><span class="avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <div class="player-chip__name">أحمد ع.</div>
            <div class="player-chip__role" style="color:var(--accent);font-weight:700">كابتن</div>
          </div>
          <div class="player-chip">
            <span class="ring ring-primary"><span class="avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <div class="player-chip__name">ياسين ر.</div>
          </div>
          <div class="player-chip">
            <span class="ring ring-silver"><span class="avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <div class="player-chip__name">كريم م.</div>
          </div>
          <div class="player-chip">
            <span class="ring ring-bronze"><span class="avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <div class="player-chip__name">سامح ع.</div>
          </div>
          <div class="player-chip">
            <span class="ring ring-primary"><span class="avatar"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v1h18v-1c0-3.5-4-6-9-6z"/></svg></span></span>
            <div class="player-chip__name">خالد س.</div>
          </div>
          <div class="player-chip player-chip--empty">
            <span class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 5v14M5 12h14"/></svg></span>
            <div class="player-chip__role">فاضي</div>
          </div>
          <div class="player-chip player-chip--empty">
            <span class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 5v14M5 12h14"/></svg></span>
            <div class="player-chip__role">فاضي</div>
          </div>
        </div>
      </section>

    </main>

    <!-- Sticky CTA -->
    <div class="sticky-cta">
      <a href="join-request-status.html" class="btn-pitch" style="display:block;text-align:center;line-height:52px;text-decoration:none">طلب انضمام للفريق</a>
    </div>

  </div>
</body>
</html>
