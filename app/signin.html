<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول — الحجز الممتاز</title>

  <!-- Bootstrap 5 RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="auth-shell">
    <div class="auth-wrap">

      <!-- Brand -->
      <header class="brand">
        <span class="brand-logo" aria-hidden="true">
          <img src="../logo.png" alt="logo" height="100" />
        </span>
        <p class="brand-subtitle">سجل دخولك عشان تبدأ مسيرتك الاحترافية</p>
      </header>

      <!-- Card -->
      <section class="glass-card">
        <h2 class="card-title">تسجيل دخول</h2>

        <form novalidate action="/app/matches.html">
          <!-- Email -->
          <div class="field">
            <label class="field-label" for="email">الإيميل</label>
            <div class="input-shell">
              <input id="email" type="email" inputmode="email" placeholder="example@domain.com" autocomplete="email" />
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                  stroke-linejoin="round">
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <path d="m3 7 9 6 9-6" />
                </svg>
              </span>
            </div>
          </div>

          <!-- Password -->
          <div class="field">
            <label class="field-label" for="password">كلمة السر</label>
            <div class="input-shell">
              <button type="button" class="input-icon" data-toggle-password="password" aria-label="إظهار كلمة السر">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
              <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
                  stroke-linejoin="round">
                  <rect x="4" y="11" width="16" height="9" rx="2" />
                  <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                </svg>
              </span>
            </div>
          </div>

          <!-- Forgot -->
          <div class="forgot-row">
            <a href="#" class="link-primary-soft">نسيت الباسورد؟</a>
          </div>

          <button type="submit" class="btn-pitch">دخول</button>
        </form>
      </section>

      <!-- Footer -->
      <p class="auth-footer">
        معندكش حساب؟ <a href="signup.html">سجل دلوقتي</a>
      </p>

    </div>
  </main>

  <script>
    // Password visibility toggle
    document.querySelectorAll("[data-toggle-password]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = document.getElementById(btn.dataset.togglePassword);
        if (!input) return;
        var show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.setAttribute("aria-label", show ? "إخفاء كلمة السر" : "إظهار كلمة السر");
      });
    });
  </script>
</body>

</html>
