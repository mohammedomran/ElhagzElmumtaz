<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حالة الطلب — الحجز الممتاز</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-page">

    <header class="app-bar">
      <h1 class="app-bar__brand">الحجز الممتاز</h1>
      <a href="matches.html" class="icon-btn" aria-label="إغلاق">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </a>
    </header>

    <main class="app-content">
      <div class="status-wrap">

        <span class="status-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8M18 2c0 5-4 6-6 8M6 22c0-5 4-6 6-8M18 22c0-5-4-6-6-8"/>
          </svg>
        </span>

        <span class="pill pill--accent pill--dot">قيد المراجعة</span>

        <h2 class="status-title">طلبك تحت التنفيذ</h2>

        <div class="status-detail">
          تم استلام الإيصال — هنبعتلك تأكيد على واتساب أول ما نأكد الدفع.
          <div class="status-detail__row">
            <span>رقم العملية</span>
            <span class="status-detail__code">#PX-9921</span>
          </div>
        </div>

        <a href="#" class="btn-whatsapp">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.4 5 5.1-1.3A10 10 0 1 0 12 2zm5.3 14.2c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8s.7-2 .9-2.2c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.3 0 .5l-.4.6c-.1.2-.3.3-.1.6.1.2.6 1 1.4 1.7 1 .9 1.8 1.1 2 1.2.2.1.4.1.5-.1l.7-.8c.2-.2.3-.2.6-.1l1.9.9c.2.1.4.2.5.3.1.3.1.7-.1 1.3z"/></svg>
          تواصل معنا على واتساب
        </a>

        <p class="status-foot">سوف يتم تحويلك لمحادثة مباشرة مع خدمة العملاء</p>
      </div>
    </main>

  </div>
</body>
</html>
